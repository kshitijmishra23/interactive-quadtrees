<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f7f8fc">
  <title>Quad Tree Playground | Kshitij Mishra</title>
  <style>
    :root {
      --bg: #f7f8fc;
      --panel: #ffffff;
      --ink: #171822;
      --muted: #686b78;
      --border: #d9dce7;
      --grid: #aeb4c3;
      --purple: #4b35d1;
      --purple-soft: #eeeaff;
      --pink: #f22d8b;
      --pink-soft: #ffe7f2;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }
    button, input, select { font: inherit; }
    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 14px;
      height: 100%;
      padding: 14px;
    }
    .toolbar, .panel {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 20px;
      min-height: 76px;
      padding: 14px 18px;
    }
    .brand { margin-right: auto; }
    .brand strong { display: block; font-size: 17px; letter-spacing: -.01em; }
    .brand span { color: var(--muted); font-size: 12px; }
    .field { display: flex; align-items: center; gap: 8px; }
    .field label {
      color: var(--muted);
      font: 600 12px ui-monospace, SFMono-Regular, Menlo, monospace;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    input, select {
      height: 40px;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--ink);
      background: #fff;
      outline: none;
    }
    input:focus, select:focus { border-color: var(--purple); box-shadow: 0 0 0 3px var(--purple-soft); }
    input { width: 76px; padding: 0 11px; }
    select { min-width: 70px; padding: 0 28px 0 11px; }
    button {
      height: 40px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0 15px;
      color: var(--ink);
      background: #fff;
      cursor: pointer;
      font-weight: 650;
    }
    button:hover { border-color: #aeb2c0; background: #fafaff; }
    button.primary { border-color: var(--purple); color: #fff; background: var(--purple); }
    button.primary:hover { background: #3d29bb; }
    .workspace { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; min-height: 0; }
    .panel { display: grid; grid-template-rows: 52px 1fr; min-width: 0; min-height: 0; overflow: hidden; }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
    }
    .panel-head h2 { margin: 0; font-size: 14px; letter-spacing: -.01em; }
    .panel-meta { color: var(--muted); font: 11px ui-monospace, SFMono-Regular, Menlo, monospace; }
    .stage { position: relative; min-height: 0; overflow: hidden; }
    canvas, svg { display: block; width: 100%; height: 100%; }
    #space { cursor: crosshair; touch-action: none; }
    #tree { cursor: grab; touch-action: none; }
    #tree:active { cursor: grabbing; }
    .hint {
      position: absolute;
      right: 12px;
      bottom: 10px;
      padding: 5px 8px;
      border-radius: 4px;
      color: var(--muted);
      background: rgba(255,255,255,.88);
      pointer-events: none;
      font: 11px ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .legend { display: flex; align-items: center; gap: 12px; color: var(--muted); font-size: 11px; }
    .legend span { display: flex; align-items: center; gap: 5px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.internal { background: var(--purple); }
    .dot.leaf { background: var(--pink); }
    .empty {
      position: absolute;
      inset: 0;
      display: grid;
      place-content: center;
      gap: 4px;
      text-align: center;
      color: var(--muted);
      pointer-events: none;
    }
    .empty strong { color: #444755; font-size: 14px; }
    .empty span { font-size: 12px; }
    @media (max-width: 820px) {
      body { overflow: auto; }
      .app { height: auto; min-height: 100%; }
      .toolbar { align-items: flex-start; flex-wrap: wrap; }
      .brand { width: 100%; }
      .field { flex: 1; min-width: 130px; }
      .field input, .field select { flex: 1; }
      .workspace { grid-template-columns: 1fr; }
      .panel { height: 520px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="toolbar" aria-label="Playground controls">
      <div class="brand"><strong>Quad Tree Playground</strong><span>by Kshitij Mishra</span></div>
      <div class="field"><label for="capacity">Capacity</label><select id="capacity"><option>1</option><option>2</option><option selected>4</option><option>8</option></select></div>
      <div class="field"><label for="randomCount">Random points</label><input id="randomCount" type="number" min="1" max="500" value="50"></div>
      <button class="primary" id="addRandom" type="button">Add random</button>
      <button id="clear" type="button">Clear</button>
    </section>

    <section class="workspace">
      <article class="panel">
        <header class="panel-head"><h2>Spatial partition</h2><span class="panel-meta" id="spaceMeta">0 points · 1 region</span></header>
        <div class="stage"><canvas id="space" aria-label="Interactive quad tree spatial partition"></canvas><span class="hint">Click or drag to add points</span></div>
      </article>
      <article class="panel">
        <header class="panel-head"><h2>Tree representation</h2><div class="legend"><span><i class="dot internal"></i>internal</span><span><i class="dot leaf"></i>leaf</span></div></header>
        <div class="stage" id="treeStage">
          <svg id="tree" aria-label="Quad tree node representation"></svg>
          <div class="empty" id="empty"><strong>The root is empty</strong><span>Add points to grow the tree</span></div>
        </div>
      </article>
    </section>
  </main>

  <script>
    const NS = "http://www.w3.org/2000/svg";
    const canvas = document.querySelector("#space");
    const ctx = canvas.getContext("2d");
    const svg = document.querySelector("#tree");
    const treeStage = document.querySelector("#treeStage");
    const capacityInput = document.querySelector("#capacity");
    const randomCountInput = document.querySelector("#randomCount");
    const meta = document.querySelector("#spaceMeta");
    const empty = document.querySelector("#empty");
    let points = [];
    let root = null;
    let hoveredId = null;
    let dragging = false;
    let view = { x: 0, y: 0, scale: 1 };
    let pan = null;
    let nextId = 0;

    class Node {
      constructor(x, y, w, h, depth = 0) {
        this.id = nextId++;
        this.x = x; this.y = y; this.w = w; this.h = h; this.depth = depth;
        this.points = []; this.children = null; this.count = 0;
      }
      contains(p) { return p.x >= this.x && p.x < this.x + this.w && p.y >= this.y && p.y < this.y + this.h; }
      subdivide() {
        const hw = this.w / 2, hh = this.h / 2, d = this.depth + 1;
        this.children = [
          new Node(this.x, this.y, hw, hh, d),
          new Node(this.x + hw, this.y, hw, hh, d),
          new Node(this.x, this.y + hh, hw, hh, d),
          new Node(this.x + hw, this.y + hh, hw, hh, d)
        ];
      }
      insert(p, capacity) {
        if (!this.contains(p)) return false;
        this.count++;
        if (!this.children && (this.points.length < capacity || this.depth >= 9 || this.w < 4 || this.h < 4)) {
          this.points.push(p); return true;
        }
        if (!this.children) {
          this.subdivide();
          const old = this.points.splice(0);
          for (const item of old) this.children.some(child => child.insert(item, capacity));
        }
        return this.children.some(child => child.insert(p, capacity));
      }
    }

    function rebuild() {
      nextId = 0;
      root = new Node(0, 0, canvas.clientWidth, canvas.clientHeight);
      const capacity = Number(capacityInput.value);
      for (const point of points) root.insert(point, capacity);
      drawSpace();
      drawTree();
    }

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const oldW = root ? root.w : rect.width;
      const oldH = root ? root.h : rect.height;
      if (points.length && oldW && oldH) {
        points = points.map(p => ({ x: p.x / oldW * rect.width, y: p.y / oldH * rect.height }));
      }
      const ratio = Math.min(devicePixelRatio || 1, 2);
      canvas.width = Math.round(rect.width * ratio);
      canvas.height = Math.round(rect.height * ratio);
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      rebuild();
    }

    function collectNodes(node, out = []) {
      out.push(node);
      if (node.children) node.children.forEach(child => collectNodes(child, out));
      return out;
    }

    function drawSpace() {
      const w = canvas.clientWidth, h = canvas.clientHeight;
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, w, h);
      const nodes = collectNodes(root);
      for (const node of nodes) {
        if (node.depth === 0) continue;
        ctx.strokeStyle = node.id === hoveredId ? "#4b35d1" : "#aeb4c3";
        ctx.lineWidth = node.id === hoveredId ? 2 : 1;
        ctx.strokeRect(node.x + .5, node.y + .5, node.w - 1, node.h - 1);
        if (node.id === hoveredId) {
          ctx.fillStyle = "rgba(75,53,209,.08)";
          ctx.fillRect(node.x, node.y, node.w, node.h);
        }
      }
      for (const p of points) {
        ctx.beginPath(); ctx.arc(p.x, p.y, 3.6, 0, Math.PI * 2);
        ctx.fillStyle = "#4b35d1"; ctx.fill();
      }
      meta.textContent = points.length + (points.length === 1 ? " point · " : " points · ") + nodes.length + (nodes.length === 1 ? " region" : " regions");
    }

    function treeMetrics(node) {
      if (!node.children) return { leaves: 1, depth: node.depth };
      const children = node.children.map(treeMetrics);
      return { leaves: children.reduce((sum, m) => sum + m.leaves, 0), depth: Math.max(...children.map(m => m.depth)) };
    }

    function layoutTree(node) {
      let leafCursor = 0;
      const positions = new Map();
      function visit(current) {
        if (!current.children) {
          const x = leafCursor++;
          positions.set(current.id, { x, y: current.depth });
          return x;
        }
        const childX = current.children.map(visit);
        const x = childX.reduce((a, b) => a + b, 0) / childX.length;
        positions.set(current.id, { x, y: current.depth });
        return x;
      }
      visit(node);
      return { positions, leafCount: Math.max(leafCursor, 1) };
    }

    function svgEl(name, attrs = {}) {
      const el = document.createElementNS(NS, name);
      Object.entries(attrs).forEach(([key, value]) => el.setAttribute(key, value));
      return el;
    }

    function drawTree() {
      svg.replaceChildren();
      empty.hidden = points.length > 0;
      if (!root) return;
      const nodes = collectNodes(root);
      const metrics = treeMetrics(root);
      const layout = layoutTree(root);
      const pad = 44;
      const xGap = Math.max(18, Math.min(56, (treeStage.clientWidth - pad * 2) / Math.max(layout.leafCount - 1, 1)));
      const yGap = Math.max(58, Math.min(80, (treeStage.clientHeight - pad * 2) / Math.max(metrics.depth, 1)));
      const contentW = Math.max((layout.leafCount - 1) * xGap + pad * 2, treeStage.clientWidth - 20);
      const contentH = Math.max((metrics.depth + 1) * yGap + pad * 2, treeStage.clientHeight - 20);
      svg.setAttribute("viewBox", "0 0 " + treeStage.clientWidth + " " + treeStage.clientHeight);
      const group = svgEl("g", { transform: "translate(" + view.x + " " + view.y + ") scale(" + view.scale + ")" });
      const offsetX = Math.max(pad, (contentW - (layout.leafCount - 1) * xGap) / 2);
      const pos = id => {
        const p = layout.positions.get(id);
        return { x: offsetX + p.x * xGap, y: pad + p.y * yGap };
      };
      for (const node of nodes) {
        if (!node.children) continue;
        const a = pos(node.id);
        for (const child of node.children) {
          const b = pos(child.id);
          group.appendChild(svgEl("line", { x1:a.x, y1:a.y, x2:b.x, y2:b.y, stroke:"#c5c8d2", "stroke-width":"1.2" }));
        }
      }
      for (const node of nodes) {
        const p = pos(node.id);
        const g = svgEl("g", { transform:"translate(" + p.x + " " + p.y + ")", tabindex:"0", role:"button", "aria-label":(node.children ? "Internal" : "Leaf") + " node with " + node.count + " points" });
        g.style.cursor = "pointer";
        const active = node.id === hoveredId;
        if (active) g.appendChild(svgEl("circle", { r:"22", fill:node.children ? "#eeeaff" : "#ffe7f2" }));
        g.appendChild(svgEl("circle", { r:"15", fill:node.children ? "#4b35d1" : "#f22d8b" }));
        const text = svgEl("text", { x:"0", y:"1", fill:"#fff", "font-size":"10", "font-weight":"700", "text-anchor":"middle", "dominant-baseline":"middle" });
        text.textContent = node.count;
        g.appendChild(text);
        g.addEventListener("mouseenter", () => { hoveredId = node.id; drawSpace(); drawTree(); });
        g.addEventListener("mouseleave", () => { hoveredId = null; drawSpace(); drawTree(); });
        group.appendChild(g);
      }
      svg.appendChild(group);
      const boundsW = Math.max(contentW * view.scale, treeStage.clientWidth);
      const boundsH = Math.max(contentH * view.scale, treeStage.clientHeight);
      svg.dataset.bounds = boundsW + "," + boundsH;
    }

    function addPointFromEvent(event) {
      const rect = canvas.getBoundingClientRect();
      points.push({ x: Math.max(0, Math.min(rect.width - .01, event.clientX - rect.left)), y: Math.max(0, Math.min(rect.height - .01, event.clientY - rect.top)) });
      rebuild();
    }
    canvas.addEventListener("pointerdown", event => { dragging = true; canvas.setPointerCapture(event.pointerId); addPointFromEvent(event); });
    canvas.addEventListener("pointermove", event => {
      if (!dragging) return;
      const rect = canvas.getBoundingClientRect();
      const last = points[points.length - 1];
      const x = event.clientX - rect.left, y = event.clientY - rect.top;
      if (!last || Math.hypot(last.x - x, last.y - y) > 12) addPointFromEvent(event);
    });
    canvas.addEventListener("pointerup", () => dragging = false);
    canvas.addEventListener("pointercancel", () => dragging = false);

    document.querySelector("#addRandom").addEventListener("click", () => {
      const amount = Math.max(1, Math.min(500, Number(randomCountInput.value) || 1));
      const w = canvas.clientWidth, h = canvas.clientHeight;
      for (let i = 0; i < amount; i++) points.push({ x: 8 + Math.random() * Math.max(1, w - 16), y: 8 + Math.random() * Math.max(1, h - 16) });
      rebuild();
    });
    document.querySelector("#clear").addEventListener("click", () => { points = []; hoveredId = null; view = { x:0, y:0, scale:1 }; rebuild(); });
    capacityInput.addEventListener("change", rebuild);

    svg.addEventListener("wheel", event => {
      event.preventDefault();
      const rect = svg.getBoundingClientRect();
      const mx = event.clientX - rect.left, my = event.clientY - rect.top;
      const old = view.scale;
      view.scale = Math.max(.35, Math.min(2.5, view.scale * (event.deltaY < 0 ? 1.12 : .89)));
      view.x = mx - (mx - view.x) * (view.scale / old);
      view.y = my - (my - view.y) * (view.scale / old);
      drawTree();
    }, { passive:false });
    svg.addEventListener("pointerdown", event => { pan = { x:event.clientX, y:event.clientY, vx:view.x, vy:view.y }; svg.setPointerCapture(event.pointerId); });
    svg.addEventListener("pointermove", event => { if (!pan) return; view.x = pan.vx + event.clientX - pan.x; view.y = pan.vy + event.clientY - pan.y; drawTree(); });
    svg.addEventListener("pointerup", () => pan = null);
    svg.addEventListener("pointercancel", () => pan = null);

    new ResizeObserver(resizeCanvas).observe(canvas);
    new ResizeObserver(drawTree).observe(treeStage);
  </script>
</body>
</html>
